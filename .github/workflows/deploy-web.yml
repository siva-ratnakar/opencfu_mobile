name: Deploy web to GitHub Pages

# Builds lib/main.dart for the web (the stub OpenCFU engine, not the native
# one -- see docs/BUILD.md's "Known limitation" section) and publishes it to
# GitHub Pages. Requires a one-time setting: repo Settings > Pages > Source =
# "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # base-href derived from the repo name so this keeps working if the
      # repo is renamed -- matches https://<user>.github.io/<repo-name>/.
      # Hosting at a custom domain instead? Change this to "/" and add a
      # web/CNAME file with the domain (flutter build web copies it over).
      - run: flutter build web --release --base-href /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
